
name: Test Workflow

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: Test suite
        type: choice
        options:
          - functional
          - regression

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run selected test suite
        run: echo "Running ${{ github.event.inputs.test_suite }} tests"
