name: Matrix Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        color: [green, pink]
        animal: [owl, magpie]
        include:
          - color: blue
            animal: owl
          - color: pink
            animal: magpie
    steps:
      - run: echo "Color is ${{ matrix.color }}, Animal is ${{ matrix.animal }}"
